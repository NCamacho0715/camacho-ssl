<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Laboratorio de Criptografía</title>

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container py-4">

  <h1 class="text-center mb-4">
    🔐 Laboratorio de Criptoanálisis Clásico
  </h1>

  <!-- GRID PRINCIPAL -->
  <div class="workspace-grid">

    <!-- PANEL PRINCIPAL -->
    <div class="panel main-panel">

      <h5>Texto (entrada única)</h5>

      <textarea id="inputText"
        placeholder="Introduce texto cifrado o texto plano..."></textarea>

      <!-- OPCIONES CIFRADO -->
      <div id="encryptOptions" class="mt-3">

        <label class="form-label">Algoritmo para cifrar:</label>

        <select id="cipherSelect" class="form-select mb-2">
          <option value="caesar">César</option>
          <option value="affine">Afín</option>
          <option value="vigenere">Vigenère</option>
        </select>

        <input id="keyInput"
          class="form-control"
          placeholder="Clave (ej: 11 | 5,7 | NUBE)">
      </div>

      <!-- BOTONES -->
      <div class="mt-3 d-flex gap-2">

        <button id="encryptBtn" class="btn btn-success">
          🔒 Cifrar
        </button>

        <button id="decryptBtn" class="btn btn-primary">
          🔓 Descifrar (Automático)
        </button>

        <button id="clearBtn" class="btn btn-outline-secondary">
          Limpiar
        </button>

      </div>

    </div>

    <!-- PANEL LATERAL -->
    <div class="panel side-panel">
      <h5>Diagnóstico criptográfico</h5>
      <ul>
        <li>
          Índice de Coincidencia:
          <span id="icResult">--</span>
        </li>

        <li>
          Cifrado detectado:
          <span id="cipherType">--</span>
        </li>

        <li>
          Clave estimada:
          <span id="keyResult">--</span>
        </li>
      </ul>
    </div>

  </div>

  <!-- RESULTADO -->
  <section class="panel mt-4">
    <h5>Resultado</h5>
    <textarea id="outputText" readonly></textarea>
  </section>

  <!-- HISTOGRAMA -->
  <section class="panel mt-4">
    <h5>Análisis de frecuencias</h5>
    <canvas id="freqChart"></canvas>
  </section>

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- SCRIPT PRINCIPAL -->
<script type="module" src="js/main.js"></script>

</body>
</html>
